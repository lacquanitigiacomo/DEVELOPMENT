version: '3.8'

# =========================================================
# RYB Infrastructure Stack
# Database, cache, storage per sviluppo locale
# =========================================================

services:
  # PostgreSQL — Database principale
  postgres:
    image: postgres:16-alpine
    container_name: ryb-postgres
    environment:
      POSTGRES_USER: ryb_dev
      POSTGRES_PASSWORD: ryb_dev_secret_2026
      POSTGRES_DB: ryb_development
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ryb_dev -d ryb_development"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ryb-network

  # Redis — Cache e job queue
  redis:
    image: redis:7-alpine
    container_name: ryb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ryb-network

  # MinIO — Object storage (S3 compatibile)
  minio:
    image: minio/minio:latest
    container_name: ryb-minio
    environment:
      MINIO_ROOT_USER: rybadmin
      MINIO_ROOT_PASSWORD: rybadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ryb-network

  # MailHog — Email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ryb-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ryb-network

  # pgAdmin — GUI PostgreSQL (opzionale)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ryb-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@ryb.local
      PGADMIN_DEFAULT_PASSWORD: ryb_dev
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - ryb-network

  # Redis Insight — GUI Redis (opzionale)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: ryb-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    networks:
      - ryb-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:
  redisinsight_data:

networks:
  ryb-network:
    driver: bridge
    name: ryb-network
