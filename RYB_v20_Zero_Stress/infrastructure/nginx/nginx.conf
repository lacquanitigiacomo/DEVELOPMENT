events { worker_connections 1024; }
http {
  upstream frontend { server localhost:5173; }
  upstream backend { server localhost:3001; }
  upstream mobile { server localhost:5174; }

  server {
    listen 80;
    server_name ryb.local;

    location / { proxy_pass http://frontend; proxy_set_header Host $host; }
    location /api/ { proxy_pass http://backend; proxy_set_header Host $host; }
    location /mobile/ { proxy_pass http://mobile; proxy_set_header Host $host; }
  }
}
